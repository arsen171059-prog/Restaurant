<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Кошик - Ristorante Bella</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header text-white py-3">
    <div class="container d-flex justify-content-between align-items-center">
      <h1 class="mb-0 logo-text">Ristorante Bella</h1>
      <nav>
        <a href="index.html" class="btn btn-outline-light me-2">Головна</a>
        <a href="catalog.html" class="btn btn-outline-light me-2">Меню</a>
        <a href="cart.html" class="btn btn-warning">Кошик (<span id="cart-count">0</span>)</a>
      </nav>
    </div>
  </header>

  <div class="bg-light py-4 text-center">
    <h2 class="fw-bold">Мій кошик</h2>
  </div>

  <main class="container py-5">
    <div class="row g-4">

      <!-- список страв у кошику -->
      <div class="col-lg-8">
        <div id="cart-items"></div>
      </div>

      <!-- форма замовлення -->
      <div class="col-lg-4">
        <div class="card shadow-sm mb-3">
          <div class="card-body d-flex justify-content-between fw-bold fs-5">
            <span>Разом:</span>
            <span id="total-price">0 грн</span>
          </div>
        </div>
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="fw-bold mb-3">Оформити замовлення</h5>
            <div class="mb-3">
              <label class="form-label">Ваше iм'я</label>
              <input type="text" id="customer-name" class="form-control" placeholder="Наприклад: Олена" />
            </div>
            <div class="mb-3">
              <label class="form-label">Телефон</label>
              <input type="tel" id="customer-phone" class="form-control" placeholder="+38 (099) 000-00-00" />
            </div>
            <button onclick="placeOrder()" class="btn btn-danger w-100 fw-bold">Замовити</button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="site-footer text-white text-center py-3">
    <p class="mb-0">вул. Хрещатик, 1 | +38 (099) 123-45-67</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    renderCart();
    updateCartBadge();
  </script>
</body>
</html>
